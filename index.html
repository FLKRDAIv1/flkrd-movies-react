  <style>
    :root {
      --brand-red: #e50914;
      --brand-red-rgb: 229, 9, 20;
      --bg-primary: #000000;
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      --box-bg: rgba(255, 255, 255, 0.03);
      --border-color: rgba(255, 255, 255, 0.1);
      --card-bg: #0c0c0c;
      --nav-bg: rgba(0, 0, 0, 0.4);
      --glow: rgba(var(--brand-red-rgb), 0.2);
      --input-bg: rgba(255, 255, 255, 0.05);
    }

    .light-mode {
      --bg-primary: #f8fafc;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --box-bg: #ffffff;
      --border-color: #e2e8f0;
      --card-bg: #ffffff;
      --nav-bg: rgba(255, 255, 255, 0.7);
      --glow: rgba(var(--brand-red-rgb), 0.1);
      --input-bg: #ffffff;
    }

    .premium-theme-active {
      --bg-primary: rgba(0, 0, 0, 0.2);
      --card-bg: rgba(12, 12, 12, 0.4);
      --box-bg: rgba(255, 255, 255, 0.02);
      --nav-bg: rgba(0, 0, 0, 0.3);
      --border-color: rgba(255, 255, 255, 0.05);
    }

    /* Moonlight Theme Specific Overrides */
    .theme-premium-particles-moon {
      --bg-primary: #020617;
      /* Deep Midnight */
      --text-primary: #f8fafc;
      /* Silver Slate */
      --text-secondary: #94a3b8;
      /* Cool Gray */
      --card-bg: rgba(15, 23, 42, 0.6);
      --box-bg: rgba(30, 41, 59, 0.3);
      --border-color: rgba(148, 163, 184, 0.1);
      --brand-red: #94a3b8;
      /* Shift brand color to Silver in Moonlight mode? Maybe just subtle blue */
      --glow: rgba(148, 163, 184, 0.15);
    }

    .theme-premium-particles-moon .text-brand {
      color: #cbd5e1;
    }

    .theme-premium-particles-moon .bg-brand {
      background-color: #475569;
    }

    body {
      font-family: 'Zain', sans-serif;
      font-weight: 700;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-x: hidden;
    }

    /* Scrollbar */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Special Enhanced Shimmer Text Effect */
    .shimmer-text {
      background: linear-gradient(to right,
          var(--text-primary) 20%,
          var(--brand-red) 40%,
          #ff4d4d 50%,
          var(--brand-red) 60%,
          var(--text-primary) 80%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer-special 3s linear infinite;
      display: inline-block;
    }

    @keyframes shimmer-special {
      to {
        background-position: 200% center;
      }
    }

    .dark-gradient-mask {
      mask-image: linear-gradient(to top, black 20%, transparent 100%);
    }

    /* Native shadows based on accent color */
    .accent-shadow {
      box-shadow: 0 10px 30px -10px rgba(var(--brand-red-rgb), 0.5);
    }

    .accent-glow {
      filter: drop-shadow(0 0 15px rgba(var(--brand-red-rgb), 0.3));
    }

    /* Zain Typography Utility Classes */
